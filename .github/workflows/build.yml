name: Build Totem Firmware

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-dev-arm:2.5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Initialize west
        run: |
          west init -l config
          west update

      - name: Build left half
        run: |
          west build -s zmk/app -d build/left \
            -b seeeduino_xiao_ble \
            -- -DZMK_CONFIG=$(pwd)/config -DSHIELD=totem_left

      - name: Build right half
        run: |
          west build -s zmk/app -d build/right \
            -b seeeduino_xiao_ble \
            -- -DZMK_CONFIG=$(pwd)/config -DSHIELD=totem_right

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zmk-firmware
          path: |
            build/left/zephyr/zmk.uf2
            build/right/zephyr/zmk.uf2